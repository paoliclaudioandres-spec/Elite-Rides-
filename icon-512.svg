<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0E0E0E"/>
  <!-- Gold border frame -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.4"/>
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
  <!-- Noise texture simulation (dot grid) -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.6" fill="#C9A84C" opacity="0.05"/>
  </pattern>
  <rect width="512" height="512" fill="url(#dots)"/>
  <!-- Car body -->
  <g transform="translate(256,280)">
    <!-- Main body -->
    <rect x="-110" y="-38" width="220" height="62" rx="10" fill="#C9A84C" opacity="0.85"/>
    <!-- Roof/cabin -->
    <rect x="-72" y="-80" width="130" height="46" rx="12" fill="#C9A84C" opacity="0.65"/>
    <!-- Windows -->
    <rect x="-66" y="-76" width="52" height="36" rx="6" fill="#0E0E0E" opacity="0.55"/>
    <rect x="-8" y="-76" width="52" height="36" rx="6" fill="#0E0E0E" opacity="0.55"/>
    <!-- Front lights -->
    <rect x="96" y="-26" width="18" height="8" rx="4" fill="#E8D5A3" opacity="0.8"/>
    <!-- Rear lights -->
    <rect x="-114" y="-26" width="14" height="8" rx="4" fill="#E05A5A" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="-68" cy="30" r="24" fill="#141414" stroke="#C9A84C" stroke-width="4"/>
    <circle cx="68" cy="30" r="24" fill="#141414" stroke="#C9A84C" stroke-width="4"/>
    <circle cx="-68" cy="30" r="9" fill="#C9A84C" opacity="0.5"/>
    <circle cx="68" cy="30" r="9" fill="#C9A84C" opacity="0.5"/>
    <!-- Ground shadow -->
    <ellipse cx="0" cy="60" rx="130" ry="6" fill="#C9A84C" opacity="0.05"/>
  </g>
  <!-- Brand name -->
  <text x="256" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" font-weight="300" fill="#C9A84C" text-anchor="middle" letter-spacing="10">ÉLITE</text>
  <text x="256" y="185" font-family="Arial, sans-serif" font-size="22" fill="#9A9088" text-anchor="middle" letter-spacing="18" font-weight="200">RIDES</text>
  <!-- Decorative lines -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>
  <line x1="120" y1="204" x2="392" y2="204" stroke="#C9A84C" stroke-width="0.4" opacity="0.15"/>
  <!-- Bottom text -->
  <text x="256" y="415" font-family="Arial, sans-serif" font-size="18" fill="#6A6460" text-anchor="middle" letter-spacing="5">TRASLADOS PREMIUM</text>
  <line x1="100" y1="430" x2="412" y2="430" stroke="#C9A84C" stroke-width="1" opacity="0.25"/>
  <text x="256" y="452" font-size="20" fill="#C9A84C" text-anchor="middle" opacity="0.5">★ ★ ★ ★ ★</text>
</svg>
